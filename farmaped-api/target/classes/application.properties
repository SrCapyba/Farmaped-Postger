spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== SERVIDOR =====
server.port=8080

# ===== LOGGING =====
logging.level.com.br.farmaped=DEBUG